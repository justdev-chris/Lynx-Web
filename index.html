<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lynx Web Terminal</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🐱%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">

    <!-- ─── VCONSOLE (only on ?debug) ────────────────────────────── -->
    <script>
        if (window.location.search.includes('debug')) {
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/vconsole@latest/dist/vconsole.min.js';
            script.onload = () => {
                window.vConsole = new VConsole();
                console.log('🐱 vConsole loaded');
            };
            document.head.appendChild(script);
        }
    </script>
</head>
<body>
    <div id="terminal"></div>
    <div class="prompt-line">
        <span class="prompt">🐱 lynx&gt;</span>
        <input id="input" type="text" autofocus spellcheck="false" autocomplete="off">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tar-js@1.0.1/tar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="js/lynx.min.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/packages.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/terminal.js"></script>
</body>
</html>
